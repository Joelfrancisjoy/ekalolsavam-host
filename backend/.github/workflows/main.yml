name: Supabase Migrate

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpq-dev default-libmysqlclient-dev libssl-dev

      - name: Verify repo paths
        run: |
          pwd
          ls -la

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify psycopg installation
        run: |
          echo "PIP LIST:"
          python -m pip list
          echo "SHOW PACKAGE INFO:"
          python -m pip show psycopg || true
          echo "PYTHON IMPORT TESTS:"
          python - <<'PY'
          import sys
          print('Python', sys.version)
          try:
            import psycopg
            print('Imported psycopg', getattr(psycopg, '__version__', 'unknown'))
          except Exception as e:
            print('psycopg import failed:', type(e).__name__, e)
            raise SystemExit(1)
          PY

      - name: Prepare for migration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: 'False'
        run: |
          python manage.py migrate --noinput
          # collectstatic is optional; allow it to fail harmlessly if staticfiles not configured
          python manage.py collectstatic --noinput || true
