openapi: 3.0.3
info:
  title: E-Kalolsavam API
  version: 1.0.0
  description: OpenAPI contract for frontend-backend integration.
paths:
  /api/auth/admin/assign-volunteer/:
    post:
      operationId: api_auth_admin_assign_volunteer_create
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '201':
          description: No response body
  /api/auth/admin/ids/:
    get:
      operationId: api_auth_admin_ids_list
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminIssuedID'
          description: ''
  /api/auth/admin/ids/{id}/:
    get:
      operationId: api_auth_admin_ids_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminIssuedID'
          description: ''
    put:
      operationId: api_auth_admin_ids_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminIssuedID'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminIssuedID'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminIssuedID'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminIssuedID'
          description: ''
    patch:
      operationId: api_auth_admin_ids_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAdminIssuedID'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAdminIssuedID'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAdminIssuedID'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminIssuedID'
          description: ''
  /api/auth/admin/ids/generate/:
    post:
      operationId: api_auth_admin_ids_generate_create
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '201':
          description: No response body
  /api/auth/admin/school-group-participants/:
    get:
      operationId: api_auth_admin_school_group_participants_list
      description: Admin endpoint to view submitted school group entries.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SchoolGroupEntry'
          description: ''
  /api/auth/admin/school-group-participants/{group_entry_id}/:
    patch:
      operationId: api_auth_admin_school_group_participants_partial_update
      parameters:
      - in: path
        name: group_entry_id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedStudentGroupProfileUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedStudentGroupProfileUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedStudentGroupProfileUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolGroupEntry'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: ''
  /api/auth/admin/school-group-participants/{group_entry_id}/approve/:
    post:
      operationId: api_auth_admin_school_group_participants_approve_create
      parameters:
      - in: path
        name: group_entry_id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSchoolGroupApproveRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminSchoolGroupApproveRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminSchoolGroupApproveRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSchoolGroupApproveResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: ''
  /api/auth/admin/school-group-participants/{group_entry_id}/reject/:
    post:
      operationId: api_auth_admin_school_group_participants_reject_create
      parameters:
      - in: path
        name: group_entry_id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSchoolGroupRejectRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminSchoolGroupRejectRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminSchoolGroupRejectRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSchoolGroupRejectResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: ''
  /api/auth/admin/school-participants/:
    get:
      operationId: api_auth_admin_school_participants_list
      description: |-
        Admin endpoint to view all school participants pending approval.
        This displays in the User Management panel under Students section.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SchoolParticipant'
          description: ''
  /api/auth/admin/school-participants/{participant_id}/approve/:
    post:
      operationId: api_auth_admin_school_participants_approve_create
      description: |-
        Approve a school participant and create their user account.
        Generates username/password and assigns section based on class.
      parameters:
      - in: path
        name: participant_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/admin/school-participants/bulk-approve/:
    post:
      operationId: api_auth_admin_school_participants_bulk_approve_create
      description: Bulk approve multiple school participants at once.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/admin/schools/create/:
    post:
      operationId: api_auth_admin_schools_create_create
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '201':
          description: No response body
  /api/auth/admin/schools/link-user/:
    post:
      operationId: api_auth_admin_schools_link_user_create
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/admin/signup-requests/:
    get:
      operationId: api_auth_admin_signup_requests_list
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IDSignupRequest'
          description: ''
  /api/auth/admin/signup-requests/{id}/:
    get:
      operationId: api_auth_admin_signup_requests_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IDSignupRequest'
          description: ''
    put:
      operationId: api_auth_admin_signup_requests_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IDSignupRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/IDSignupRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/IDSignupRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IDSignupRequest'
          description: ''
    patch:
      operationId: api_auth_admin_signup_requests_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedIDSignupRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedIDSignupRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedIDSignupRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IDSignupRequest'
          description: ''
  /api/auth/allowed-emails/:
    get:
      operationId: api_auth_allowed_emails_list
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AllowedEmail'
          description: ''
    post:
      operationId: api_auth_allowed_emails_create
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AllowedEmail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AllowedEmail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AllowedEmail'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllowedEmail'
          description: ''
  /api/auth/allowed-emails/{id}/:
    get:
      operationId: api_auth_allowed_emails_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllowedEmail'
          description: ''
    put:
      operationId: api_auth_allowed_emails_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AllowedEmail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AllowedEmail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AllowedEmail'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllowedEmail'
          description: ''
    patch:
      operationId: api_auth_allowed_emails_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAllowedEmail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAllowedEmail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAllowedEmail'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllowedEmail'
          description: ''
    delete:
      operationId: api_auth_allowed_emails_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/auth/allowed-emails/{id}/toggle/:
    post:
      operationId: api_auth_allowed_emails_toggle_create
      description: Toggle the active status of an allowed email
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/allowed-emails/bulk-add/:
    post:
      operationId: api_auth_allowed_emails_bulk_add_create
      description: Bulk add multiple email addresses to the allowed list
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/allowed-emails/check/:
    get:
      operationId: api_auth_allowed_emails_check_retrieve
      description: Check if an email is in the allowed list (public endpoint for frontend
        validation)
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/allowed-emails/check-registered/:
    get:
      operationId: api_auth_allowed_emails_check_registered_retrieve
      description: Check if an email is registered with valid role (student, volunteer,
        judge) - for admin validation
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/current/:
    get:
      operationId: api_auth_current_retrieve
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/emails/exists/:
    get:
      operationId: api_auth_emails_exists_retrieve
      description: |-
        Public endpoint to check if an email is already registered (for registration form validation).
        Returns: { email, exists: true|false }
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/google/:
    post:
      operationId: api_auth_google_create
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/ids/check/:
    post:
      operationId: api_auth_ids_check_create
      description: |-
        Public endpoint to check if an ID code is valid and available.
        Used by registration form for real-time validation.
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/login/:
    post:
      operationId: api_auth_login_create
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/password/accept-pending/:
    post:
      operationId: api_auth_password_accept_pending_create
      description: |-
        Accept the password provided during registration (if any) as the new password
        after logging in with the temporary password sent by admin.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/password/set-new/:
    post:
      operationId: api_auth_password_set_new_create
      description: |-
        Set a brand new password instead of using the registration-time pending one.
        Expects: { new_password }
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/profile/:
    patch:
      operationId: api_auth_profile_partial_update
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/register/:
    post:
      operationId: api_auth_register_create
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistration'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistration'
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistration'
          description: ''
  /api/auth/register/with-id/:
    post:
      operationId: api_auth_register_with_id_create
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          description: No response body
  /api/auth/schools/:
    get:
      operationId: api_auth_schools_list
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/School'
          description: ''
  /api/auth/schools/group-events/:
    get:
      operationId: api_auth_schools_group_events_list
      parameters:
      - in: query
        name: genderCategory
        schema:
          enum:
          - BOYS
          - GIRLS
          - MIXED
          type: string
          minLength: 1
        description: |-
          * `BOYS` - BOYS
          * `GIRLS` - GIRLS
          * `MIXED` - MIXED
      - in: query
        name: gender_category
        schema:
          enum:
          - BOYS
          - GIRLS
          - MIXED
          type: string
          minLength: 1
        description: |-
          * `BOYS` - BOYS
          * `GIRLS` - GIRLS
          * `MIXED` - MIXED
      - in: query
        name: groupClass
        schema:
          enum:
          - LP
          - UP
          - HS
          - HSS
          type: string
          minLength: 1
        description: |-
          * `LP` - LP
          * `UP` - UP
          * `HS` - HS
          * `HSS` - HSS
      - in: query
        name: group_class
        schema:
          enum:
          - LP
          - UP
          - HS
          - HSS
          type: string
          minLength: 1
        description: |-
          * `LP` - LP
          * `UP` - UP
          * `HS` - HS
          * `HSS` - HSS
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: ''
  /api/auth/schools/group-participants/:
    get:
      operationId: api_auth_schools_group_participants_list
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SchoolGroupEntry'
          description: ''
  /api/auth/schools/group-participants/{group_entry_id}/:
    patch:
      operationId: api_auth_schools_group_participants_partial_update
      parameters:
      - in: path
        name: group_entry_id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedStudentGroupProfileUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedStudentGroupProfileUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedStudentGroupProfileUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolGroupEntry'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: ''
  /api/auth/schools/group-participants/import/:
    post:
      operationId: api_auth_schools_group_participants_import_create
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/schools/group-participants/submit/:
    post:
      operationId: api_auth_schools_group_participants_submit_create
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/schools/individual-events/:
    get:
      operationId: api_auth_schools_individual_events_list
      parameters:
      - in: query
        name: genderCategory
        schema:
          enum:
          - BOYS
          - GIRLS
          - MIXED
          type: string
          minLength: 1
        description: |-
          * `BOYS` - BOYS
          * `GIRLS` - GIRLS
          * `MIXED` - MIXED
      - in: query
        name: gender_category
        schema:
          enum:
          - BOYS
          - GIRLS
          - MIXED
          type: string
          minLength: 1
        description: |-
          * `BOYS` - BOYS
          * `GIRLS` - GIRLS
          * `MIXED` - MIXED
      - in: query
